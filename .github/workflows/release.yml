name: Publish to NPM registry

on:
  workflow_dispatch:
    inputs:
      releaseType:
        description: 'Release type - major, minor or patch'
        required: true
        default: 'patch'
      distTag:
        description: 'NPM tag (e.g. use "next" to release a test version)'
        required: true
        default: 'latest'

permissions:
  contents: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          ref: 'main'
          fetch-depth: 0
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: 'https://registry.npmjs.org'
          package-manager-cache: false
      - name: Remove deprecated npm config
        run: npm config delete always-auth --location=user
      - name: Git Setup
        run: |
          git config --global user.email "samtreweek@gmail.com"
          git config --global user.name "Sam Treweek"

      - run: npm ci

      - name: Build
        run: npm run build
        env:
            NODE_ENV: production

      - name: Run eslint & prettier
        run: npm run lint && npm run format:check

      - name: Run tests
        run: npm test

      - name: Release
        run: npm run release:ci -- ${{github.event.inputs.releaseType}} --npm.tag=${{github.event.inputs.distTag}}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
